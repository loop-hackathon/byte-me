# ======================================================================
# Grafana Tempo Configuration
# ======================================================================
# Minimal configuration suitable for local development.
# Stores traces on the container's local filesystem.
# ======================================================================

stream_over_http_enabled: true

server:
  http_listen_port: 3200   # Grafana queries Tempo on this port

distributor:
  receivers:
    otlp:
      protocols:
        # Accept traces from the OTEL Collector via gRPC
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m   # Cut blocks every 5 minutes (fine for dev)

compactor:
  compaction:
    block_retention: 48h   # Keep traces for 48 hours in dev

storage:
  trace:
    backend: local           # Store on disk inside the container
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

querier:
  frontend_worker:
    frontend_address: tempo:9095

query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: cloudhelm-dev
  storage:
    path: /var/tempo/generator/wal
  traces_storage:
    path: /var/tempo/generator/traces

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
