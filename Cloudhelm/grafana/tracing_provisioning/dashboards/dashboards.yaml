# ======================================================================
# Grafana Dashboard Provisioning
# ======================================================================
# Tells Grafana to load dashboards from the /dashboards folder.
# Even if the folder is empty, this file prevents Grafana from
# producing warnings about missing dashboards provider config.
# ======================================================================
apiVersion: 1

providers:
  - name: 'CloudHelm'
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
