apiVersion: 1

# ======================================================================
# Grafana Provisioning — Tempo Datasource
# ======================================================================
# This file is automatically loaded by Grafana on startup.
# It configures Tempo as a tracing backend so NO MANUAL SETUP is needed
# when containers first start.
# ======================================================================

datasources:
  - name: Tempo
    type: tempo
    uid: cloudhelm-tempo
    url: http://tempo:3200     # Grafana talks to Tempo inside Docker network
    access: proxy
    isDefault: true
    jsonData:
      httpMethod: GET
      # Enable deep-link from logs to traces
      tracesToLogsV2:
        datasourceUid: cloudhelm-tempo
      # Enable service graph view (shows dependencies between services)
      serviceMap:
        datasourceUid: cloudhelm-tempo
      # Enable searching traces by service / duration / tags
      search:
        hide: false
      # Allows clicking on a trace ID in Grafana to jump to the waterfall
      nodeGraph:
        enabled: true
